name: Check npm registry keys

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  check-npm-keys:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@2126ae7fc54c9df00dd18f7f18754393182c73cd # ratchet:cachix/install-nix-action@v31.9.1

      - name: Check
        run: ./.github/check-npm-keys.sh
